<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080d;--s1:#0c1018;--s2:#131a26;--s3:#1a2436;
  --b1:#1c2a3a;--b2:#263a50;
  --amber:#f59e0b;--amber-d:rgba(245,158,11,.12);--amber-g:rgba(245,158,11,.35);
  --teal:#14b8a6;--teal-d:rgba(20,184,166,.12);
  --rose:#f43f5e;--rose-d:rgba(244,63,94,.12);
  --violet:#8b5cf6;--violet-d:rgba(139,92,246,.12);
  --sky:#38bdf8;--sky-d:rgba(56,189,248,.12);
  --lime:#84cc16;--lime-d:rgba(132,204,22,.12);
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--t4:#475569;
  --ff:'Outfit',sans-serif;--df:'Fraunces',serif;
}
body{background:var(--bg);color:var(--t1);font-family:var(--ff);font-size:13px;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
@keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(245,158,11,.2)}50%{box-shadow:0 0 24px rgba(245,158,11,.5)}}

header{padding:14px 28px;border-bottom:1px solid var(--b1);background:linear-gradient(180deg,var(--s1),var(--bg));position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.nav-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12}
.brand{display:flex;align-items:center;gap:10}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:pulse 2s infinite;box-shadow:0 0 12px var(--amber-g)}
.brand-title{font-family:var(--df);font-size:19px;font-weight:700}
.brand-badge{font-size:9px;color:var(--t3);padding:2px 7px;border:1px solid var(--b1);border-radius:5px}
.nav-tabs{display:flex;gap:2px;background:var(--s1);border-radius:9px;padding:3px;border:1px solid var(--b1);flex-wrap:wrap}
.tab-btn{padding:6px 13px;border-radius:7px;border:none;cursor:pointer;font-family:var(--ff);font-size:11px;font-weight:400;background:transparent;color:var(--t3);transition:all .2s}
.tab-btn.active{background:var(--amber-d);color:var(--amber);font-weight:600}
.tab-btn:hover:not(.active){color:var(--t1);background:var(--s2)}

/* LANG FILTER */
.lang-bar{max-width:1400px;margin:0 auto;padding:10px 28px 0;display:flex;gap:6px;align-items:center}
.lang-label{font-size:10px;color:var(--t3);margin-right:4px;text-transform:uppercase;letter-spacing:.08em}
.pill{padding:6px 14px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--t2);font-size:12px;font-family:var(--ff);cursor:pointer;transition:all .25s;white-space:nowrap}
.pill.active-both{border-color:var(--sky);color:var(--sky);background:var(--sky-d)}
.pill.active-bengali{border-color:var(--teal);color:var(--teal);background:var(--teal-d)}
.pill.active-hindi{border-color:var(--amber);color:var(--amber);background:var(--amber-d)}
.words-count{margin-left:auto;font-size:10px;color:var(--t4)}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:14px 28px 60px}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:18px 22px;position:relative;overflow:hidden;animation:su .55s ease both}
.stat-top-bar{position:absolute;top:0;left:0;right:0;height:3px}
.stat-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;font-family:var(--df)}
.stat-sub{font-size:11px;color:var(--t4);margin-top:4px}

/* PROBLEM BANNER */
.problem{background:linear-gradient(135deg,var(--amber-d),var(--rose-d));border:1px solid rgba(245,158,11,.33);border-radius:14px;padding:22px;margin-bottom:20px}
.problem h3{font-family:var(--df);font-size:18px;color:var(--amber);margin-bottom:8px}
.problem p{font-size:13px;line-height:1.8;color:var(--t2)}

/* CHART CARDS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:18px}
.chart-title{font-family:var(--df);font-size:14px;margin-bottom:4px}
.chart-sub{font-size:10px;color:var(--t3);margin-bottom:10px}

/* PIE LEGEND */
.pie-wrap{display:flex;gap:20px;align-items:center}
.pie-legend{display:flex;flex-direction:column;gap:4px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--t3)}
.legend-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}

/* SCATTER */
.scatter-card{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:18px;margin-bottom:14px}
.scatter-legend{display:flex;gap:16px;margin-top:10px;justify-content:center}
.scatter-leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)}
.scatter-dot{width:9px;height:9px;border-radius:50%}

/* WORD EXPLORER */
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
.word-card{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:16px;cursor:pointer;transition:all .3s}
.word-card:hover{border-color:var(--b2)}
.word-card.active-bn{border-color:var(--teal);background:var(--s3);box-shadow:0 0 20px rgba(20,184,166,.1)}
.word-card.active-hi{border-color:var(--amber);background:var(--s3);box-shadow:0 0 20px rgba(245,158,11,.1)}
.word-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.word-script{font-size:24px;font-weight:700}
.word-roman{font-size:11px;color:var(--t3);font-style:italic}
.word-badges{display:flex;gap:5px}
.badge{font-size:8px;padding:2px 7px;border-radius:4px;font-weight:600;text-transform:uppercase}
.llm-line{font-size:11px;color:var(--t4);margin-bottom:6px}
.llm-val{color:var(--rose);font-weight:600}
.bar-row{margin-bottom:4px}
.bar-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:2px}
.bar-track{height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .6s}
.word-expanded{margin-top:12px;border-top:1px solid var(--b1);padding-top:12px;animation:fi .3s}
.actual-text{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:12px}
.section-label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.layer-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.layer-tag{padding:2px 8px;border-radius:4px;font-size:10px}
.layer-yes{background:var(--teal-d);color:var(--teal);border:1px solid rgba(20,184,166,.33)}
.layer-no{background:var(--rose-d);color:var(--rose);border:1px solid rgba(244,63,94,.33)}
.examples{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.example-item{font-size:11px;color:var(--t2);padding:5px 10px;background:var(--s1);border-radius:6px;line-height:1.5}
.score-trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px}
.score-box{text-align:center;padding:10px;border-radius:8px}
.score-num{font-size:20px;font-weight:700;font-family:var(--df)}
.score-lbl{font-size:8px;text-transform:uppercase;margin-top:2px}

/* MODEL ARENA */
.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.model-card{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:14px;transition:all .3s}
.model-card:hover{border-color:var(--b2);transform:scale(1.02)}
.model-name{font-size:13px;font-weight:600;margin-bottom:8px;font-family:var(--df)}
.mini-bar-row{margin-bottom:5px}
.mini-bar-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:2px}
.mini-bar-track{height:3px;background:var(--b1);border-radius:2px}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .5s}

/* SIMULATOR */
.sim-layout{display:grid;grid-template-columns:300px 1fr;gap:16px}
.sim-panel{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:16px}
.sim-output{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:22px;min-height:380px}
.sim-btn{display:block;width:100%;padding:9px 12px;margin-bottom:5px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);color:var(--t2);font-size:12px;font-family:var(--ff);cursor:pointer;text-align:left;transition:all .2s}
.sim-btn.active-word{border-color:var(--amber);background:var(--amber-d);color:var(--amber)}
.sim-btn.active-prompt{border-color:var(--sky);background:var(--sky-d);color:var(--sky)}

.run-btn:hover{filter:brightness(1.15)}
.run-btn:disabled{background:var(--b1);cursor:wait;animation:glow 1.5s infinite}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.output-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em}
.output-text{font-size:14px;color:var(--t2);line-height:1.8;min-height:80px}
.output-placeholder{color:var(--t4);font-style:italic}
.cursor{color:var(--amber);animation:blink 1s infinite}
.analysis{margin-top:20px;border-top:1px solid var(--b1);padding-top:14px;animation:fi .4s}

/* REFS */
.ref-item{display:flex;gap:12px;align-items:flex-start;padding:12px 16px;border-radius:10px}
.ref-year{width:40px;height:40px;border-radius:8px;background:var(--amber-d);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--amber);font-family:var(--df);flex-shrink:0}
.ref-title{font-size:12px;font-weight:600;margin-bottom:2px}
.ref-meta{font-size:10px;color:var(--t3)}
.dataset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}
.dataset-card{padding:10px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:8px}

/* METHOD */
.method-trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px}
.method-card{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.method-top{position:absolute;top:0;left:0;right:0;height:3px}
.timeline-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:8px}

/* FOOTER */
footer{border-top:1px solid var(--b1);padding:16px 28px;text-align:center;font-size:10px;color:var(--t4)}

/* RADAR — pure SVG */
.radar-svg text{font-family:var(--ff);font-size:10px;fill:var(--t3)}
</style>
</head>

function getWords() {
  if (activeLang === "bangla") return banglaWords;
  if (activeLang === "hindi") return hindiWords;
  return [...banglaWords, ...hindiWords];
}

function avgLoss(words) {
  return (words.reduce((a, w) => a + (1 - w.captured / w.total) * 10, 0) / words.length).toFixed(1);
}
function severeCount(words) { return words.filter(w => w.distortion === "Severe").length; }
function avgCRS(words) {
  return (words.reduce((s, w) => s + (w.captured / w.total) * 100, 0) / words.length).toFixed(1);
}

  else if (activeTab === "words") renderWords(main, words);
  else if (activeTab === "models") renderModels(main, words);
  else if (activeTab === "simulator") renderSimulator(main);
  else if (activeTab === "method") renderMethod(main);

}

function runSim() {
  const r = simDB[simWord];
  if (!r) { simOutput = "Select মায়া, আড্ডা, जुगाड़, or विरह for the live demo."; renderSimulator(document.getElementById("mainContent")); return; }
  const text = r[simPrompt] || r.direct;
  if (simInterval) clearInterval(simInterval);
  simRunning = true; simOutput = "";
  renderSimulator(document.getElementById("mainContent"));
  let i = 0;
  simInterval = setInterval(() => {
    i++;
    simOutput = text.slice(0, i);
    const el = document.getElementById("simOutputEl");
    if (el) el.innerHTML = simOutput + '<span class="cursor">▌</span>';
    if (i >= text.length) {
      clearInterval(simInterval);
      simRunning = false;
      renderSimulator(document.getElementById("mainContent"));
    }
  }, 16);
}

// ── METHODOLOGY ───────────────────────────────────────────────────────────────
function renderMethod(main) {
  const dims = [
    {t:"Semantic Loss",ic:"🔍",c:"var(--rose)",d:"Missing meaning components",m:"0–10 from annotated reference"},
    {t:"Cultural Distortion",ic:"🔄",c:"var(--amber)",d:"Wrong cultural frame applied",m:"None / Mild / Moderate / Severe"},
    {t:"Simplification",ic:"📉",c:"var(--violet)",d:"Multi-layer → flat equivalent",m:"% of dimensions captured"}
  ];
  const dimCards = dims.map((d, i) => `
    <div class="method-card" style="animation:su .5s ease ${i*.1}s both">
      <div class="method-top" style="background:${d.c}"></div>
      <div style="font-size:26px;margin-bottom:8px">${d.ic}</div>
      <h4 style="font-family:var(--df);font-size:16px;color:${d.c};margin-bottom:6px">${d.t}</h4>
      <p style="font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:10px">${d.d}</p>
      <div style="padding:8px 10px;background:${d.c}11;border-radius:6px;font-size:10px;color:var(--t2)"><span style="color:${d.c};font-weight:600">Scoring:</span> ${d.m}</div>
    </div>`).join("");

  const modelBadges = modelData.map(m => `<div style="padding:10px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;font-size:12px;color:${m.color};font-weight:600">${m.model}</div>`).join("");

  const timeline = [
    {p:"Phase 1",t:"Literature Review & Word Selection",w:"Weeks 1–2",c:"var(--sky)"},
    {p:"Phase 2",t:"Gold Standard Annotation",w:"Weeks 3–4",c:"var(--teal)"},
    {p:"Phase 3",t:"LLM Data Collection",w:"Weeks 5–6",c:"var(--amber)"},
    {p:"Phase 4",t:"Expert Scoring",w:"Weeks 7–8",c:"var(--violet)"},
    {p:"Phase 5",t:"Analysis & Dashboard",w:"Weeks 9–11",c:"var(--rose)"},
    {p:"Phase 6",t:"Paper Submission",w:"Week 12",c:"var(--lime)"}
  ];
  const timelineHtml = timeline.map((p, i) => `
    <div class="timeline-item" style="background:${i%2===0?"var(--s2)":"transparent"};animation:su .3s ease ${i*.04}s both">
      <div style="width:9px;height:9px;border-radius:50%;background:${p.c};box-shadow:0 0 8px ${p.c}55;flex-shrink:0"></div>
      <div style="width:70px;font-size:9px;color:${p.c};font-weight:600;text-transform:uppercase">${p.p}</div>
      <div style="flex:1;font-size:12px;color:var(--t1)">${p.t}</div>
      <div style="font-size:11px;color:var(--t3)">${p.w}</div>
    </div>`).join("");

  main.innerHTML = `<div style="animation:fi .4s">
    <h2 style="font-family:var(--df);font-size:24px;margin-bottom:16px">Research Methodology</h2>
    <div class="method-trio">${dimCards}</div>
    <h3 style="font-family:var(--df);font-size:17px;margin-bottom:10px">Models Tested</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:24px">${modelBadges}</div>
    <h3 style="font-family:var(--df);font-size:17px;margin-bottom:10px">Research Timeline</h3>
    ${timelineHtml}
  </div>`;
}

// ── REFERENCES ────────────────────────────────────────────────────────────────

  const refs = [
    {a:"Kabir et al.",y:2024,t:"BenLLM-Eval: LLMs on Bengali NLP",v:"arXiv:2309.13173"},
    {a:"Li et al.",y:2024,t:"CultureLLM: Cultural Differences in LLMs",v:"NeurIPS 2024"},
    {a:"Chiu et al.",y:2025,t:"CulturalBench: Cultural Knowledge Benchmark",v:"ACL 2025"},
    {a:"Liu et al.",y:2024,t:"Multilingual LLMs as Culturally-Diverse Reasoners",v:"NAACL 2024"},

    {a:"LFAI Foundation",y:2024,t:"Translation Augmented Generation",v:"OSS Summit NA"},
    {a:"Zehady et al.",y:2024,t:"BanglaLLaMA: LLaMA for Bangla",v:"arXiv:2410.21200"},
    {a:"arXiv:2502.11187",y:2025,t:"TituLLMs: Bangla LLMs with Benchmarking",v:"arXiv"},

    <div class="ref-item" style="background:${i%2===0?"var(--s2)":"transparent"};animation:su .3s ease ${i*.03}s both">
      <div class="ref-year">${r.y}</div>
      <div><div class="ref-title">${r.t}</div><div class="ref-meta">${r.a} — <span style="color:var(--amber)">${r.v}</span></div></div>

  const datasets = [
    {n:"CulturalBench",d:"1,696 Qs, 45 regions"},{n:"BenLLM-Eval",d:"7 tasks, 8 datasets"},
    {n:"MAPS",d:"Proverbs, 6 languages"},{n:"NativQA",d:"Culturally-aligned queries"},
    {n:"World Values Survey",d:"WVS-7 (2017–22)"},{n:"CultureLLM",d:"Fine-tuning framework"}
  ];
  const dsHtml = datasets.map(b => `<div class="dataset-card"><div style="font-size:11px;font-weight:600;color:var(--teal);margin-bottom:2px">${b.n}</div><div style="font-size:10px;color:var(--t3)">${b.d}</div></div>`).join("");

  main.innerHTML = `<div style="animation:fi .4s">
    <h2 style="font-family:var(--df);font-size:24px;margin-bottom:16px">References</h2>
    ${refHtml}
    <h3 style="font-family:var(--df);font-size:16px;margin-top:24px;margin-bottom:10px">Datasets</h3>
    <div class="dataset-grid">${dsHtml}</div>
  </div>`;
}

// ── EVENT LISTENERS ───────────────────────────────────────────────────────────
document.getElementById("navTabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab-btn");
  if (!btn) return;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeTab = btn.dataset.tab;
  activeWord = null;
  simOutput = "";
  if (simInterval) clearInterval(simInterval);
  simRunning = false;
  render();
});

document.querySelector(".lang-bar").addEventListener("click", e => {
  const btn = e.target.closest(".pill");
  if (!btn) return;
  document.querySelectorAll(".pill").forEach(b => b.className = "pill");
  activeLang = btn.dataset.lang;
  btn.classList.add("active-" + activeLang);
  activeWord = null;
  render();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
